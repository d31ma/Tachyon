name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure npm registry
        run: |
          {
            echo "@d31ma:registry=https://registry.npmjs.org/"
          } > .npmrc
          cp .npmrc ~/.npmrc
          cat >> bunfig.toml <<'EOF'

          [install.scopes]
          "@d31ma" = { url = "https://registry.npmjs.org/" }
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install example dependencies
        run: cd examples && bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Type check
        run: bun run typecheck

      - name: Run tests with coverage
        run: bun run test:coverage
        env:
          HOSTNAME: 127.0.0.1
          BASIC_AUTH: admin:pass

      - name: Run package blackbox tests
        run: bun run test:blackbox
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}

  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.read.outputs.package_name }}
      version: ${{ steps.read.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}
      github_version_exists: ${{ steps.check_github.outputs.exists }}
      npm_version_exists: ${{ steps.check_npm.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read package version
        id: read
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME"
          echo "Version: $VERSION"

      - name: Check version tag
        id: check
        env:
          TAG: v${{ steps.read.outputs.version }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists; skipping publish and release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GitHub Packages version
        id: check_github
        env:
          PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
          VERSION: ${{ steps.read.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
        run: |
          cat > ~/.npmrc <<EOF
          @d31ma:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF

          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Packages already has ${PACKAGE_NAME}@${VERSION}."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm version
        id: check_npm
        env:
          PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
          VERSION: ${{ steps.read.outputs.version }}
        run: |
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "npm already has ${PACKAGE_NAME}@${VERSION}."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to GitHub Packages
    needs: [test, version]
    if: >-
      ${{
        always() &&
        needs.test.result == 'success' &&
        needs.version.result == 'success' &&
        needs.version.outputs.tag_exists == 'false' &&
        needs.version.outputs.github_version_exists == 'false'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    environment: packages-prod

    steps:
      - name: Publish via FOUNDRY
        id: publish_github
        continue-on-error: true
        uses: d31ma/FOUNDRY/.github/actions/publish-github-package@main
        with:
          package_name: ${{ needs.version.outputs.package_name }}
          version: ${{ needs.version.outputs.version }}
          github_dist_tag: beta
          publish_token: ${{ github.token }}
          packages_read_token: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
          install_command: |
            cat > .npmrc <<'EOF'
            @d31ma:registry=https://registry.npmjs.org/
            EOF
            cp .npmrc ~/.npmrc
            cp "$RUNNER_TEMP/original-bunfig.toml" bunfig.toml 2>/dev/null || true
            cat >> bunfig.toml <<'EOF'

            [install.scopes]
            "@d31ma" = { url = "https://registry.npmjs.org/" }
            EOF
            bun install --frozen-lockfile

      - name: Verify GitHub Packages artifact
        env:
          PACKAGE_NAME: ${{ needs.version.outputs.package_name }}
          VERSION: ${{ needs.version.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
        run: |
          cat > ~/.npmrc <<EOF
          @d31ma:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF
          npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com

  promote-npm:
    name: Promote to npm registry
    needs: [version, publish]
    if: >-
      ${{
        always() &&
        needs.version.result == 'success' &&
        needs.version.outputs.tag_exists == 'false' &&
        needs.version.outputs.npm_version_exists == 'false' &&
        (
          needs.publish.result == 'success' ||
          (
            needs.version.outputs.github_version_exists == 'true' &&
            needs.publish.result == 'skipped'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      packages: read

    env:
      PACKAGE_NAME: ${{ needs.version.outputs.package_name }}
      VERSION: ${{ needs.version.outputs.version }}
      NPM_DIST_TAG: latest
      GITHUB_PACKAGES_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Configure GitHub Packages read access
        run: |
          {
            echo "@d31ma:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${GITHUB_PACKAGES_TOKEN}"
            echo "always-auth=true"
          } > "$RUNNER_TEMP/github-packages.npmrc"

      - name: Verify GitHub Packages version exists
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/github-packages.npmrc
        run: npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com

      - name: Pack exact GitHub Packages artifact
        id: pack
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/github-packages.npmrc
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/npm-promotion"
          npm pack "${PACKAGE_NAME}@${VERSION}" \
            --registry=https://npm.pkg.github.com \
            --pack-destination "$RUNNER_TEMP/npm-promotion" \
            --json > "$RUNNER_TEMP/npm-promotion/pack.json"
          TARBALL=$(node -e "const data = require(process.env.RUNNER_TEMP + '/npm-promotion/pack.json'); console.log(data[0].filename)")
          echo "tarball=$RUNNER_TEMP/npm-promotion/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish tarball to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            {
              echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}"
            } > "$RUNNER_TEMP/npm-publish.npmrc"
            export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/npm-publish.npmrc"
          fi
          npm publish "${{ steps.pack.outputs.tarball }}" --access public --tag "$NPM_DIST_TAG" --registry=https://registry.npmjs.org

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [version, publish, promote-npm]
    if: >-
      ${{
        always() &&
        needs.version.outputs.tag_exists == 'false' &&
        needs.promote-npm.result == 'success' &&
        (
          needs.publish.result == 'success' ||
          needs.publish.result == 'skipped'
        )
      }}
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push version tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
