name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install FYLO, CHEX, and TTID binaries
        run: |
          sh ./scripts/install-vendor-bins.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test
        env:
          HOSTNAME: 127.0.0.1
          BASIC_AUTH: admin:pass

  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read package version
        id: read
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check version tag
        id: check
        env:
          TAG: v${{ steps.read.outputs.version }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists; skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  github-release:
    name: Build binaries and release
    runs-on: ubuntu-latest
    needs: [test, version]
    if: >-
      ${{
        needs.test.result == 'success' &&
        needs.version.result == 'success' &&
        needs.version.outputs.tag_exists == 'false'
      }}
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          build() {
            echo "::group::$2"
            bun build --compile --target="$1" ./src/cli/index.js --outfile "dist-bin/$2"
            echo "::endgroup::"
          }
          build bun-linux-x64     ty-linux-x64
          build bun-linux-arm64   ty-linux-arm64
          build bun-darwin-x64    ty-macos-x64
          build bun-darwin-arm64  ty-macos-arm64
          build bun-windows-x64   ty-windows-x64.exe
          cd dist-bin && sha256sum ty-* > SHA256SUMS

      - name: Create and push version tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes

      - name: Upload binaries, checksums, and installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release upload "v$VERSION" \
            dist-bin/ty-* dist-bin/SHA256SUMS \
            install.sh install.ps1 \
            --clobber
