name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        bun-version: [latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Configure npm registry
        run: |
          {
            echo "@d31ma:registry=https://registry.npmjs.org/"
          } > .npmrc
          cp .npmrc ~/.npmrc
          cat >> bunfig.toml <<'EOF'

          [install.scopes]
          "@d31ma" = { url = "https://registry.npmjs.org/" }
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile


      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Type check
        run: bun run typecheck

      - name: Run tests with coverage
        if: matrix.bun-version == 'latest'
        run: bun run test:coverage
        env:
          HOSTNAME: 127.0.0.1
          BASIC_AUTH: admin:pass

      - name: Run tests
        if: matrix.bun-version != 'latest'
        run: bun run test
        env:
          HOSTNAME: 127.0.0.1
          BASIC_AUTH: admin:pass

      - name: Run package blackbox tests
        if: matrix.bun-version == 'latest'
        run: bun run test:blackbox
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
