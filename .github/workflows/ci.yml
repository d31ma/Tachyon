name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install FYLO, CHEX, and TTID binaries
        run: |
          sh ./scripts/install-vendor-bins.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test
        env:
          HOSTNAME: 127.0.0.1
          BASIC_AUTH: admin:pass

  build:
    name: Binary compile smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile ty and verify it runs
        run: |
          set -euo pipefail
          bun build --compile --target=bun-linux-x64 ./src/cli/index.js --outfile ty
          ./ty --version
          ./ty --help

  macos-native:
    name: macOS native host compile smoke
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate and compile the complete macOS host
        run: bun test tests/compiler/native-ui-host.test.js --timeout 120000 --test-name-pattern 'macOS emits isolated managed-content'

  linux-native:
    name: Linux native host compile smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgtk-3-dev libjson-glib-dev libwebkit2gtk-4.1-dev libx11-dev
          bun install --frozen-lockfile

      - name: Generate and compile the complete Linux host
        run: bun test tests/compiler/native-ui-host.test.js --timeout 120000 --test-name-pattern 'linux emits only its concrete desktop capability adapters'
        env:
          TACHYON_NATIVE_COMPILE_SMOKE: '1'

  windows-native:
    name: Windows native host compile smoke
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install pinned WebView2 SDK
        shell: pwsh
        run: |
          $sdkRoot = Join-Path $env:RUNNER_TEMP 'webview2-sdk'
          nuget install Microsoft.Web.WebView2 `
            -Version 1.0.4078.44 `
            -Source https://api.nuget.org/v3/index.json `
            -OutputDirectory $sdkRoot `
            -ExcludeVersion `
            -NonInteractive
          "WEBVIEW2_SDK_ROOT=$sdkRoot\Microsoft.Web.WebView2" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate and compile the complete Windows host
        run: bun scripts/windows-native-compile-smoke.js
