name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install FYLO, CHEX, and TTID binaries
        run: |
          sh ./scripts/install-vendor-bins.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test
        env:
          HOSTNAME: 127.0.0.1
          BASIC_AUTH: admin:pass

  build:
    name: Binary compile smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile ty and verify it runs
        run: |
          set -euo pipefail
          bun build --compile --target=bun-linux-x64 ./src/cli/index.js --outfile ty
          ./ty --version
          ./ty --help
