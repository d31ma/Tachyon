name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read
  statuses: read
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Wait for other checks to pass
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          sleep 20
          deadline=$((SECONDS + 2700))

          while true; do
            check_runs="$(gh api --paginate "/repos/$REPO/commits/$SHA/check-runs?per_page=100" --jq '.check_runs[] | select((.details_url // "" | contains("/actions/runs/'"$CURRENT_RUN_ID"'")) | not) | select(.name != "Claude review") | [.name, .status, (.conclusion // "")] | @tsv' || true)"
            statuses="$(gh api "/repos/$REPO/commits/$SHA/status" --jq '.statuses | sort_by(.context) | group_by(.context)[] | max_by(.updated_at) | [.context, .state] | @tsv' || true)"

            failing_checks="$(printf '%s\n' "$check_runs" | awk -F '\t' 'NF && $2 == "completed" && $3 != "success" && $3 != "neutral" && $3 != "skipped" { print }')"
            pending_checks="$(printf '%s\n' "$check_runs" | awk -F '\t' 'NF && $2 != "completed" { print }')"
            failing_statuses="$(printf '%s\n' "$statuses" | awk -F '\t' 'NF && $2 != "success" && $2 != "pending" { print }')"
            pending_statuses="$(printf '%s\n' "$statuses" | awk -F '\t' 'NF && $2 == "pending" { print }')"

            if [ -n "$failing_checks$failing_statuses" ]; then
              echo "A required check or status failed:"
              printf '%s\n%s\n' "$failing_checks" "$failing_statuses" | sed '/^$/d' | sed 's/^/  /'
              exit 1
            fi

            if [ -z "$pending_checks$pending_statuses" ]; then
              echo "All other checks and statuses passed."
              exit 0
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for checks to pass."
              printf '%s\n%s\n' "$pending_checks" "$pending_statuses" | sed '/^$/d' | sed 's/^/  /'
              exit 1
            fi

            echo "Waiting for checks and statuses:"
            printf '%s\n%s\n' "$pending_checks" "$pending_statuses" | sed '/^$/d' | sed 's/^/  /'
            sleep 30
          done

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request now that the other checks have passed.

            Start from the PR diff, then inspect the surrounding project code needed to understand system-level impact. Evaluate how these changes affect the whole project, including existing public APIs, data flows, persistence, build and deploy behavior, tests, documentation, security boundaries, performance, and backwards compatibility.

            Focus on correctness, regressions, security, performance, maintainability, and missing tests. Do not leave purely stylistic comments unless they point to a concrete bug or risk.

            Use inline comments for specific actionable findings. Use a single top-level PR comment for the summary, including when there are no findings. In the summary, briefly state what project areas you inspected beyond the diff.
          claude_args: |
            --max-turns 30
            --model claude-opus-4-7
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
