<w-app-bar sticky scroll-behavior="elevate">
  <w-container size="xl" class="w-row align-center ga-2 px-0">
    <w-app-bar-nav-icon for="site-drawer" class="only-below-desktop" aria-label="Open site navigation"></w-app-bar-nav-icon>

    <a href="/" class="w-row align-center ga-2 mr-auto" aria-label="Tachyon home">
      <img class="brand-mark" src="/shared/assets/logo.svg" alt="" width="28" height="28" />
      <span class="brand-name">TACHYON</span>
      <w-chip size="x-small" color="success">{release}</w-chip>
    </a>

    <nav class="w-row align-center ga-1 only-desktop" aria-label="Primary navigation">
      <w-btn href="/" variant="text" size="sm">Home</w-btn>
      <w-btn href="/atlas" variant="text" size="sm">Atlas</w-btn>
      <w-btn href="/docs" variant="text" size="sm">Docs</w-btn>
    </nav>

    <w-btn variant="text" size="sm" w-theme-toggle aria-label="Switch color theme">
      ◐<span class="w-hide-phone"> Theme</span>
    </w-btn>
    <w-btn variant="text" size="sm" href="https://github.com/d31ma/Tachyon" target="_blank" rel="noopener" class="w-hide-phone">GitHub</w-btn>
  </w-container>
</w-app-bar>

<w-navigation-drawer id="site-drawer" temporary label="Site navigation">
  <w-list>
    <w-list-item href="/" title="Home" subtitle="Why Tachyon"></w-list-item>
    <w-list-item href="/atlas" title="Capability atlas" subtitle="Live in-browser demos"></w-list-item>
    <w-list-item href="/docs" title="Documentation" subtitle="Guides and reference"></w-list-item>
    <w-list-item href="https://github.com/d31ma/Tachyon" title="GitHub" subtitle="Website source"></w-list-item>
  </w-list>
</w-navigation-drawer>
