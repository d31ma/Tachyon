<div class="stats-grid" role="group" aria-label="Live application statistics">
  <w-card variant="tonal" color="primary" class="stat">
    <w-card-text><strong class="stat-value">{$visits}</strong><span class="stat-label">visits this session</span></w-card-text>
  </w-card>
  <w-card variant="tonal" class="stat">
    <w-card-text><strong class="stat-value">{$$totalVisits}</strong><span class="stat-label">visits on this browser</span></w-card-text>
  </w-card>
  <w-card variant="tonal" class="stat">
    <w-card-text><strong class="stat-value">{itemsCount}</strong><span class="stat-label">documents in OPFS</span></w-card-text>
  </w-card>
  <w-card variant="tonal" color="success" class="stat">
    <w-card-text><strong class="stat-value">{companionStatus}</strong><span class="stat-label">polyglot companions · {storageUsage} stored</span></w-card-text>
  </w-card>
</div>
