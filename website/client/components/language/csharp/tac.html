<w-card variant="outlined" class="language-card">

  <w-card-text>
    <div class="w-row ga-2"><w-chip size="small" color="success">tac.cs</w-chip><code>{status}</code></div>
    <p>FYLO CRUD through <code>Fylo.Collection(...)</code>: <strong>{docCount}</strong></p>
    <p>Dialect rule on display — JavaScript numeric semantics: <strong>{mathNote}</strong>; last wave from <strong>{lastWave}</strong>.</p>
    <div class="w-row ga-2">
      <w-btn size="sm" variant="outlined" on:click="Seed()">Seed FYLO</w-btn>
      <w-btn size="sm" variant="outlined" on:click="Wave()">Wave from C#</w-btn>
    </div>
  </w-card-text>
</w-card>
