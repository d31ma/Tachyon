<w-card variant="outlined" class="panel-card" id="browser-studio">
  <w-card-item title="Browser studio" subtitle="Semantic HTML reports state while Tac drives canvas drawing and scoped CSS sets the atmosphere.">
  </w-card-item>
  <w-card-text>
    <div class="studio">
      <figure class="studio-stage">
        <canvas width="720" height="330" aria-label="Reactive canvas visualisation"></canvas>
        <figcaption class="studio-caption">
          <output aria-live="polite">{message}</output>
          <time :datetime="lastPaintIso">{lastPaintLabel}</time>
        </figcaption>
      </figure>

      <section class="studio-controls" aria-label="Canvas controls and semantic status">
        <label class="energy">
          <span>Rendering energy <strong>{intensity}%</strong></span>
          <input type="range" min="5" max="100" :value="intensity" on:input="setIntensity($event.target.value)" />
        </label>
        <div class="gauges">
          <label>Task progress <progress max="100" :value="intensity">{intensity}%</progress></label>
          <label>Visual density <meter min="0" max="100" low="28" high="78" optimum="62" :value="intensity">{intensity}</meter></label>
        </div>
        <div class="w-row ga-2">
          <w-btn size="sm" variant="outlined" on:click="chooseMood('calm')">Calm</w-btn>
          <w-btn size="sm" variant="filled" color="secondary" on:click="chooseMood('surge')">Surge</w-btn>
          <w-btn size="sm" variant="text" on:click="redraw()">Redraw</w-btn>
        </div>
        <details>
          <summary>What this proves</summary>
          <ul>
            <li>Native <code>canvas</code> rendering controlled by companion state.</li>
            <li>Accessible <code>output</code>, <code>time</code>, <code>progress</code> and <code>meter</code> semantics.</li>
            <li>Component-scoped responsive CSS with reduced-motion support.</li>
          </ul>
        </details>
      </section>
    </div>
  </w-card-text>
</w-card>
