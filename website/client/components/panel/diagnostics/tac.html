<w-card variant="outlined" class="panel-card">
  <w-card-item title="One companion, every target" subtitle="Tac page and component companions expose a consistent reactive controller ABI across browser, desktop and mobile outputs.">
  </w-card-item>
  <w-card-text>
    <div class="w-row ga-2 diag-status">
      <w-chip size="small">{loadingState()}</w-chip>
      <w-chip size="small" color="success">{companionStatus}</w-chip>
      <w-chip size="small">native language shims</w-chip>
    </div>

    <w-table density="compact" class="diag-table">
      <table>
        <thead>
          <tr><th>Surface</th><th>Returns</th><th>Runtime behavior</th></tr>
        </thead>
        <tbody>
          <loop :for="run of verbRuns">
            <tr>
              <td><code>{run.verb}</code></td>
              <td><code>{run.returns}</code></td>
              <td class="diag-summary">{run.summary}</td>
            </tr>
          </loop>
        </tbody>
      </table>
    </w-table>

    <p class="diag-note">Companion code stays beside its template. JavaScript, TypeScript, Dart, Rust, Kotlin, Swift and C# all compile to this controller contract without a client endpoint.</p>
  </w-card-text>
</w-card>
