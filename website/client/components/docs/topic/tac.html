<article class="topic">
  <logic :if="topic">
    <header class="topic-header">
      <p class="topic-kicker">Guide</p>
      <h1>{topic.title}</h1>
      <p class="topic-summary">{topic.summary}</p>
    </header>

    <div class="topic-main">
      <loop :for="section of topic.sections">
        <section class="topic-section" :data-doc-anchor="section.id">
          <h2>{section.heading}</h2>
          <p>{section.body}</p>
          <logic :if="section.code">
            <pre class="code-block"><code>{section.code}</code></pre>
          </logic>
        </section>
      </loop>
      <nav class="topic-pager" aria-label="Topic pagination">
        <logic :if="previous">
          <a class="topic-pager-link" :href="'/docs/' + previous.slug">
            <span class="topic-pager-rel">Previous</span>
            <span class="topic-pager-title">{previous.title}</span>
          </a>
        </logic>
        <span class="topic-spacer"></span>
        <logic :if="next">
          <a class="topic-pager-link topic-pager-next" :href="'/docs/' + next.slug">
            <span class="topic-pager-rel">Next</span>
            <span class="topic-pager-title">{next.title}</span>
          </a>
        </logic>
      </nav>
    </div>

    <aside class="topic-toc" aria-label="On this page">
      <p class="topic-toc-title">On this page</p>
      <ul class="topic-toc-list">
        <loop :for="link of pageLinks">
          <li class="topic-toc-item">
            <button type="button" on:click="scrollToSection(link.id)">{link.heading}</button>
          </li>
        </loop>
      </ul>
    </aside>
  </logic>
  <logic :if="!topic && !loading">
    <w-empty-state title="Topic not found" text="Pick a topic from the documentation navigation."></w-empty-state>
  </logic>
</article>
