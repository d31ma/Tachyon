<div class="surface panel clicker-card">
    <div class="surface-head">
        <md-assist-chip label="clicker"></md-assist-chip>
        <span class="clicker-badge">{clicks}</span>
    </div>
    <p class="md-typescale-body-small muted">Tac Wasm companion</p>
    <div class="clicker-value value md-typescale-display-medium">{clicks}</div>
    <div class="clicker-actions">
        <md-filled-button @click="increment()">Wasm Clicks</md-filled-button>
    </div>
</div>
