<div class="min-w-0 max-w-full h-full bg-surface-container text-on-surface border border-outline-variant p-6 flex flex-col gap-3 shadow-sm">
    <div class="flex items-center justify-between gap-3 min-w-0 flex-wrap">
        <md-assist-chip label="go"></md-assist-chip>
        <span class="inline-flex min-w-[36px] items-center justify-center bg-primary text-on-primary px-3 py-1 font-bold">{clicks}</span>
    </div>
    <p class="text-on-surface-variant text-sm m-0">TinyGo source -> Wasm</p>
    <div class="text-on-surface font-mono text-5xl leading-none">{clicks}</div>
    <div class="flex gap-3 flex-wrap mt-1">
        <md-filled-button @click="increment()">Go Clicks</md-filled-button>
    </div>
</div>
