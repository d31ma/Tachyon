<div class="col-span-full min-w-0 max-w-full h-full bg-surface-container text-on-surface border border-outline-variant p-6 flex flex-col gap-4 shadow-sm" id="inventory">
    <div class="flex items-center justify-between gap-4 min-w-0 flex-wrap">
        <h2 class="m-0 text-xl font-bold">Inventory lab</h2>
        <div class="flex items-center gap-3 flex-wrap">
            <md-text-button @click="refresh()">Refresh</md-text-button>
            <md-text-button @click="clearItems()">Clear</md-text-button>
        </div>
    </div>

    <div class="flex gap-3 items-center">
        <input
            class="flex-1 min-h-[40px] border border-outline bg-surface text-on-surface px-4 py-2 outline-none focus:border-primary focus:shadow-[0_0_0_3px_rgba(31,111,139,0.18)]"
            type="text"
            aria-label="Create a backend item"
            placeholder="Create a backend item"
            :value="newItem"
            @input="newItem = $event.target.value"
        />
        <md-filled-button @click="addItem()">Save</md-filled-button>
    </div>

    <logic :if="feedback">
        <div class="p-4 bg-secondary-container text-on-secondary-container border border-outline-variant text-sm font-medium">
            {feedback}
        </div>
    </logic>

    <logic :if="items.length > 0">
        <ul class="grid gap-3 m-0 p-0 list-none">
            <loop :for="let i = 0; i < items.length; i++">
                <li class="p-4 bg-surface-container-high flex items-center justify-between gap-4 min-w-0 flex-wrap">
                    <div class="grid gap-1">
                        <strong class="text-base font-bold">{items[i].name}</strong>
                        <p class="text-sm text-on-surface-variant m-0">{items[i].source} - {formatDate(items[i].createdAt)}</p>
                    </div>
                    <md-assist-chip :label="items[i].id.slice(0, 8)"></md-assist-chip>
                </li>
            </loop>
        </ul>
    </logic>
    <logic :if="items.length === 0">
        <p class="text-on-surface-variant text-sm m-0">No saved items yet. Create one and Yon will persist it for the next request.</p>
    </logic>
</div>
