<div class="surface panel-wide">
    <div class="surface-head">
        <div class="surface-head-text">
            <h2 class="md-typescale-title-large">Users</h2>
            <p class="md-typescale-body-small muted">Reads <code>fylo.users.find()</code> directly from the browser. The <code>fylo</code> global is compiler-injected - no manual import.</p>
        </div>
        <md-assist-chip :label="loadingState()"></md-assist-chip>
    </div>
    <logic :if="users.length > 0">
        <md-list>
            <loop :for="const user of users">
                <md-list-item>
                    <div class="list-item-text">
                        <strong>{user.email}</strong>
                        <span>{user.role} - {user.id}</span>
                    </div>
                    <md-assist-chip :label="user.role"></md-assist-chip>
                </md-list-item>
            </loop>
        </md-list>
    </logic>
    <logic :if="users.length === 0 && !loading">
        <p class="md-typescale-body-medium muted">No users yet. Check <code>FYLO_ROOT</code> and the committed data under <code>db/.collections/users</code>.</p>
    </logic>
    <logic :if="error">
        <div class="users-error md-typescale-body-medium">{error}</div>
    </logic>
</div>
