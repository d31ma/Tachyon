<div class="col-span-full min-w-0 max-w-full h-full bg-surface-container text-on-surface border border-outline-variant p-6 flex flex-col gap-4 shadow-sm">
    <div class="flex items-center justify-between gap-4 min-w-0 flex-wrap">
        <div class="grid gap-1">
            <h2 class="m-0 text-xl font-bold">Users</h2>
            <p class="text-on-surface-variant text-sm m-0">Reads <code>fylo.users.find()</code> directly from the browser. The <code>fylo</code> global is compiler-injected - no manual import.</p>
        </div>
        <md-assist-chip :label="loadingState()"></md-assist-chip>
    </div>
    <logic :if="users.length > 0">
        <md-list>
            <loop :for="const user of users">
                <md-list-item>
                    <div class="grid gap-1">
                        <strong>{user.email}</strong>
                        <span class="text-on-surface-variant text-sm">{user.role} - {user.id}</span>
                    </div>
                    <md-assist-chip :label="user.role"></md-assist-chip>
                </md-list-item>
            </loop>
        </md-list>
    </logic>
    <logic :if="users.length === 0 && !loading">
        <p class="text-on-surface-variant text-sm m-0">No users yet. Check <code>FYLO_ROOT</code> and the committed data under <code>db/.collections/users</code>.</p>
    </logic>
    <logic :if="error">
        <div class="text-error text-sm p-4 bg-error-container border border-error/20">{error}</div>
    </logic>
</div>
