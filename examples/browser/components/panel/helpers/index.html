<div class="surface" id="frontend">
    <div class="surface-head">
        <h2 class="md-typescale-title-large">Tac helpers</h2>
        <md-assist-chip label="frontend"></md-assist-chip>
    </div>
    <p class="md-typescale-body-medium muted">Theme and draft text below persist automatically because the class fields are prefixed with `$`.</p>
    <md-outlined-text-field
        type="textarea"
        class="input"
        placeholder="Draft note"
        :value="$draftNote"
        @input="$draftNote = $event.target.value"
    ></md-outlined-text-field>
    <div class="surface-actions">
        <md-text-button @click="toggleTheme()">Toggle theme</md-text-button>
        <md-text-button @click="clearDraft()">Clear draft</md-text-button>
    </div>
</div>
