<div class="min-w-0 max-w-full h-full bg-surface-container text-on-surface border border-outline-variant p-6 flex flex-col gap-4 shadow-sm" id="frontend">
    <div class="flex items-center justify-between gap-4 min-w-0 flex-wrap">
        <h2 class="m-0 text-xl font-bold">Tac helpers</h2>
        <md-assist-chip label="frontend"></md-assist-chip>
    </div>
    <p class="text-on-surface-variant text-sm m-0">Theme and draft text below persist automatically because the class fields are prefixed with <code class="px-1.5 py-0.5 bg-surface-container-high text-xs font-mono">$</code>.</p>
    <md-outlined-text-field
        type="textarea"
        class="w-full"
        placeholder="Draft note"
        :value="$draftNote"
        @input="$draftNote = $event.target.value"
    ></md-outlined-text-field>
    <div class="grid grid-cols-3 gap-3">
        <div class="flex flex-col items-center gap-0.5 px-3 py-2 bg-surface-container-high text-center">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">Chars</span>
            <span class="text-lg font-bold font-mono text-on-surface">{charCount}</span>
        </div>
        <div class="flex flex-col items-center gap-0.5 px-3 py-2 bg-surface-container-high text-center">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">Words</span>
            <span class="text-lg font-bold font-mono text-on-surface">{wordCount}</span>
        </div>
        <div class="flex flex-col items-center gap-0.5 px-3 py-2 bg-surface-container-high text-center">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">Status</span>
            <span class="text-lg font-bold font-mono text-on-surface">{draftStatus}</span>
        </div>
    </div>
    <div class="flex items-center gap-3 flex-wrap">
        <md-text-button @click="toggleTheme()">Toggle theme</md-text-button>
        <md-text-button @click="clearDraft()">Clear draft</md-text-button>
    </div>
    <div class="mt-auto pt-3 border-t border-outline-variant flex items-center justify-between gap-3 flex-wrap">
        <div class="grid gap-0.5">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">Bookmarks <code class="text-xs font-mono">$$</code></span>
            <span class="text-sm text-on-surface-variant">Persisted in localStorage via the <code class="px-1.5 py-0.5 bg-surface-container-high text-xs font-mono">$$</code> prefix.</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="inline-flex min-w-[36px] items-center justify-center bg-primary text-on-primary px-3 py-1 font-bold text-sm">{$$bookmarks}</span>
            <md-filled-button @click="addBookmark()">Bookmark</md-filled-button>
            <md-text-button @click="resetBookmarks()">Reset</md-text-button>
        </div>
    </div>
</div>
