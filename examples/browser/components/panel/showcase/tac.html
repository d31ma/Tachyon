<div class="min-w-0 max-w-full h-full bg-surface-container text-on-surface border border-outline-variant p-6 flex flex-col gap-4 shadow-sm">
    <div class="flex items-center justify-between gap-4 min-w-0 flex-wrap">
        <h2 class="m-0 text-xl font-bold">Shared browser data</h2>
        <md-assist-chip :label="loadingState()"></md-assist-chip>
    </div>
    <logic :if="showcase">
        <div class="p-4 bg-primary-container border border-outline-variant grid gap-1.5">
            <strong class="text-base font-bold text-on-primary-container">{showcase.title}</strong>
            <p class="text-sm text-on-surface-variant m-0">{showcase.summary}</p>
        </div>
    </logic>
    <logic :if="!showcase">
        <p class="text-on-surface-variant text-sm m-0">Fetching the browser-side data manifest.</p>
    </logic>

    <div class="grid grid-cols-3 gap-3">
        <div class="flex flex-col items-center gap-0.5 px-3 py-2.5 bg-surface-container-high text-center">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">Keys</span>
            <span class="text-lg font-bold font-mono text-on-surface">{storageEntries.length}</span>
        </div>
        <div class="flex flex-col items-center gap-0.5 px-3 py-2.5 bg-surface-container-high text-center">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">Total</span>
            <span class="text-lg font-bold font-mono text-on-surface">{storageSummary}</span>
        </div>
        <div class="flex flex-col items-center gap-0.5 px-3 py-2.5 bg-surface-container-high text-center">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">Session</span>
            <span class="text-lg font-bold font-mono text-on-surface">{sessionCount}</span>
        </div>
    </div>

    <logic :if="storageEntries.length">
        <div class="mt-auto pt-3 border-t border-outline-variant grid gap-2">
            <span class="text-[0.72rem] font-semibold uppercase tracking-wide text-on-surface-variant">localStorage entries</span>
            <div class="grid gap-2 max-h-[320px] overflow-y-auto">
                <loop :for="entry of storageEntries">
                    <div class="grid gap-1 px-3 py-2.5 bg-surface-container-high text-sm min-w-0">
                        <div class="flex items-center justify-between gap-2 min-w-0">
                            <span class="font-mono font-medium text-primary truncate">{entry.key}</span>
                            <span class="text-on-surface-variant text-xs shrink-0">{entry.size} B</span>
                        </div>
                        <span class="text-on-surface-variant text-xs font-mono truncate">{entry.preview}</span>
                    </div>
                </loop>
            </div>
        </div>
    </logic>
    <logic :if="!storageEntries.length">
        <p class="text-on-surface-variant text-sm m-0 mt-auto">No localStorage entries detected yet.</p>
    </logic>
</div>
