<div class="surface panel clicker-card">
    <div class="surface-head">
        <md-assist-chip :label="label"></md-assist-chip>
        <span class="clicker-badge">{$clicks}</span>
    </div>
    <p class="md-typescale-body-small muted">{release} - persists across reloads</p>
    <div class="clicker-value value md-typescale-display-medium">{$clicks}</div>
    <div class="clicker-actions">
        <md-text-button @click="$clicks = 0">Reset</md-text-button>
        <md-filled-button @click="$clicks++">Click</md-filled-button>
    </div>
</div>
