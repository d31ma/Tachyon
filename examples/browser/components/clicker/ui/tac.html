<div class="min-w-0 max-w-full h-full bg-tertiary-container text-on-tertiary-container border border-outline-variant p-6 flex flex-col gap-3 shadow-sm">
    <div class="flex items-center justify-between gap-3 min-w-0 flex-wrap">
        <md-assist-chip :label="label"></md-assist-chip>
        <span class="inline-flex min-w-[36px] items-center justify-center bg-tertiary text-on-tertiary px-3 py-1 font-bold">{$clicks}</span>
    </div>
    <p class="text-on-surface-variant text-sm m-0">{release} - reset when the session ends</p>
    <div class="text-on-tertiary-container font-mono text-5xl leading-none">{$clicks}</div>
    <div class="flex gap-3 flex-wrap mt-1">
        <md-text-button @click="$clicks = 0">Reset</md-text-button>
        <md-filled-button @click="$clicks++">Click</md-filled-button>
    </div>
</div>
